tags:
  - name: Health
    description: Service liveness endpoint.
  - name: Auth
    description: Authentication via Firebase ID token.
    externalDocs:
      description: Auth and users workflows
      url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/INTEGRATION_API_WORKFLOWS.md
  - name: Users
    description: User profile, onboarding, notifications, and devices.
    externalDocs:
      description: Push notifications and devices flow for Flutter (UA)
      url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/PUSH_NOTIFICATIONS_FLUTTER_UA.md
  - name: Collections
    description: Favorites and want-to-visit collections with guest->auth sync endpoints.
    externalDocs:
      description: Collections and guest sync workflows
      url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/INTEGRATION_API_WORKFLOWS.md
  - name: Showrooms
    description: Showroom lifecycle, listing, moderation state, favorites, search.
    externalDocs:
      description: Showrooms Flutter guide (UA)
      url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/SHOWROOMS_FLUTTER_UA.md
  - name: Lookbooks
    description: Lookbooks list/detail/create/update/favorites.
    externalDocs:
      description: Lookbooks workflows and checks
      url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/INTEGRATION_API_WORKFLOWS.md
  - name: Events
    description: Events list/detail, want-to-visit and dismiss state.
    externalDocs:
      description: Events workflows and checks
      url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/INTEGRATION_API_WORKFLOWS.md
  - name: Admin
    description: Admin moderation endpoints for showrooms.
    externalDocs:
      description: Admin analytics endpoints and dashboard integration notes
      url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/ADMIN_ANALYTICS.md
  - name: Analytics
    description: Client analytics ingest endpoint and backend analytics contract references.
    externalDocs:
      description: Analytics contract (Flutter + Backend)
      url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/ANALYTICS_CONTRACT.md

