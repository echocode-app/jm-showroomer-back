openapi: 3.0.3
info:
  title: JM Showroomer API
  version: 1.0.0
  description: |
    API lifecycle:
    - Compatibility policy: backward-compatible within v1 by default.
    - Breaking changes require a new major version at /api/v2.
    - Deprecation window target: minimum 90 days.
    - References:
      - <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/API_VERSIONING_POLICY.md" target="_blank" rel="noopener noreferrer">API_VERSIONING_POLICY.md</a>
      - <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/CHANGELOG_API.md" target="_blank" rel="noopener noreferrer">CHANGELOG_API.md</a>
      - <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/OPERATIONAL_EXPECTATIONS.md" target="_blank" rel="noopener noreferrer">OPERATIONAL_EXPECTATIONS.md</a>

    **Docs Navigation (Flutter + Product + Backend)**

    - **SHOWROOMS_MVP1_SEARCH.md**  
      For Flutter: detailed showroom search logic (modes, cursor, geo, fallback, constraints).  
      Value: correct client-side search implementation aligned with backend behavior.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/SHOWROOMS_MVP1_SEARCH.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **SHOWROOMS_FLUTTER_UA.md**  
      Для Flutter: єдиний showroom guide українською, який об’єднує owner flow, list modes, detail response, pagination і map viewport flow.  
      Value: one canonical showroom integration document for Flutter.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/SHOWROOMS_FLUTTER_UA.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **PUSH_NOTIFICATIONS_FLUTTER_UA.md**  
      Для Flutter: короткий покроковий flow по push/in-app notifications, device registration і MVP1 scope.  
      Value: no-ambiguity checklist for `POST /users/me/devices` and notifications center integration.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/PUSH_NOTIFICATIONS_FLUTTER_UA.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **CURSOR_PAGINATION_FLUTTER.md**  
      For Flutter: universal cursor pagination rules for all backend list endpoints (opaque token, reset rules, error handling).  
      Value: correct infinite scroll implementation without duplicates/skips/cursor misuse.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/CURSOR_PAGINATION_FLUTTER.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **README_UA.md**  
      For PM/client: business logic and key product flows in plain language.  
      Value: clear understanding of system behavior without technical implementation details.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/README_UA.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **README_DETAIL.md**  
      Integration hub: navigation point for all detailed integration docs.  
      Value: fast entrypoint to modular docs by topic and role.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/README_DETAIL.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **INTEGRATION_API_WORKFLOWS.md**  
      Technical endpoint map by domain and role.  
      Value: clear API workflow coverage for client and QA integration.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/INTEGRATION_API_WORKFLOWS.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **INTEGRATION_ERRORS_LIMITS.md**  
      Canonical errors/limits/cursor/idempotency guide.  
      Value: stable handling of backend constraints and failure semantics on client side.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/INTEGRATION_ERRORS_LIMITS.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **DEVELOPER_RUNBOOK.md**  
      Backend developer runbook (setup, quality gates, API-change checklist).  
      Value: faster onboarding and safer release discipline.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/DEVELOPER_RUNBOOK.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **POSTMAN_COLLECTION_GUIDE.md**  
      How to run full Postman regression collection and interpret failures.  
      Value: repeatable API verification without contract drift.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/POSTMAN_COLLECTION_GUIDE.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **README_BACKEND_MAP_UA.md**  
      Detailed backend map: modules, dependencies, layers, responsibilities, key invariants.  
      Value: fast navigation across the codebase during development and review.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/README_BACKEND_MAP_UA.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **ANALYTICS_CONTRACT.md**  
      For Flutter + Backend: analytics ingest contract, event origins, anti-duplication rules, session/anonymous identity responsibilities.  
      Value: safe client analytics integration without duplicating backend-generated events.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/ANALYTICS_CONTRACT.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **ADMIN_ANALYTICS.md**  
      For Admin Panel + Backend: admin analytics endpoints, query params, response shapes, and examples.  
      Value: predictable dashboard integration for overview/analytics pages without backend contract drift.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/ADMIN_ANALYTICS.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **FIRESTORE_REQUIRED_INDEXES.md**  
      For Backend/DevOps: required Firestore indexes and deployment notes.  
      Value: avoid `INDEX_NOT_READY` runtime failures in list/search endpoints.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/FIRESTORE_REQUIRED_INDEXES.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **FLUTTER_ENDPOINT_CHECKLIST_MVP1.md**  
      For Flutter: full MVP1 endpoint matrix with required/optional/skip scope and failure handling.  
      Value: consistent integration coverage and fewer contract misses before release.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/FLUTTER_ENDPOINT_CHECKLIST_MVP1.md" target="_blank" rel="noopener noreferrer">Open document</a>

    - **QA_POSTMAN_TESTER_CHECKLIST.md**  
      For QA: step-by-step Postman regression checklist with smoke, domain flows, and bug-report format.  
      Value: repeatable manual testing for complex backend flows.  
      <a href="https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/QA_POSTMAN_TESTER_CHECKLIST.md" target="_blank" rel="noopener noreferrer">Open document</a>
  license:
    name: UNLICENSED
    url: https://unlicense.org/
