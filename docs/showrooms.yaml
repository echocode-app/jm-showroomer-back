      security: []
      responses:
        "302":
          description: Redirect to platform-specific mobile store target
        "400":
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "404":
          description: Showroom not found, blocked by country policy, or not shareable
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /showrooms/{id}/submit:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Showroom ID
    post:
      tags: [Showrooms]
      summary: Submit showroom for review
      description: |
        Submits a draft/rejected/approved showroom for moderation.
        Status becomes pending and submittedAt is set.
        Resubmission from `approved` and `rejected` back to `pending` is intentionally allowed.
        Showroom country must match `users.me.country` by normalized country identity. Backend accepts ISO2 and full country names.
        Completeness is evaluated against canonical owner-facing fields; `geo.city` and `geo.coords` are accepted as the source-of-truth for city/location requirements.
        Error codes: SHOWROOM_INCOMPLETE (400), SHOWROOM_NAME_ALREADY_EXISTS (400), SHOWROOM_DUPLICATE (400), SHOWROOM_LOCKED_PENDING (409), SHOWROOM_NOT_EDITABLE (400).
      operationId: submitShowroom
      externalDocs:
        description: Showrooms Flutter guide (UA)
        url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/SHOWROOMS_FLUTTER_UA.md
      security:
        - bearerAuth: []
      x-roles: [owner]
      responses:
        "200":
          description: Showroom submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          showroom:
                            $ref: '#/components/schemas/ShowroomPrivileged'
              examples:
                submitted:
                  value:
                    success: true
                    data:
                      showroom:
                        id: "sr_123"
                        name: "Atelier Nova"
                        type: "multibrand"
                        country: "Ukraine"
                        ownerUid: "owner_123"
                        status: "pending"
        "400":
          description: Validation error, incomplete, or not editable
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "403":
          description: Forbidden or country blocked (includes country mismatch)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "409":
          description: Locked (pending)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /showrooms/{id}/favorite:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Showroom ID
    post:
      tags: [Showrooms]
      summary: Add showroom to favorites
      description: Auth-only, idempotent. Only approved showrooms can be favorited.
      operationId: favoriteShowroom
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Added to favorites
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          showroomId:
                            type: string
                          status:
                            type: string
                            example: favorited
              examples:
                favorited:
                  value:
                    success: true
                    data:
                      showroomId: "sr_123"
                      status: "favorited"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "404":
          description: Showroom not found or not approved
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
    delete:
      tags: [Showrooms]
      summary: Remove showroom from favorites
      description: Auth-only, idempotent.
      operationId: unfavoriteShowroom
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Removed from favorites
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          showroomId:
                            type: string
                          status:
                            type: string
                            example: removed
              examples:
                removed:
                  value:
                    success: true
                    data:
                      showroomId: "sr_123"
                      status: "removed"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
