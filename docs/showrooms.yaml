        Client sends the same `north/south/east/west` bounds and `zoom` as for `GET /showrooms/map`.
        Use this endpoint for map badge / overlay counters such as `знайдено N шоурумів`.
        Backend expands the viewport into a complete geohash cell cover for the current zoom and
