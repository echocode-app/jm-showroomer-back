            type: number
        - name: east
          in: query
          required: true
          schema:
            type: number
        - name: west
          in: query
          required: true
          schema:
            type: number
        - name: zoom
          in: query
          required: true
          schema:
            type: number
        - name: country
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [multibrand, unique]
        - name: availability
          in: query
