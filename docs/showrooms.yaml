                      total: 856
                    meta:
                      zoom: 12
                      queryPrecision: 5
                      prefixesCount: 4
                      exact: true
        "400":
          description: Invalid viewport query
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "503":
          description: Search index is not ready yet
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /showrooms/create:
    post:
      tags: [Showrooms]
      summary: Create showroom
      description: |
        Creates a showroom (status=draft).
        Draft mode is supported via body {"draft": true} or query mode=draft.
        Showroom country must match `users.me.country` by normalized country identity. Backend accepts ISO2 (e.g., UA) and full country names (e.g., Ukraine).
        Backend validates `type` (`multibrand|unique`) and `availability` (`open|appointment`) when provided.
        Owner recreation cooldown applies after soft delete: the same owner cannot recreate the same showroom
        (same normalized name) for 3 calendar months after deletion (`SHOWROOM_RECREATE_COOLDOWN`, 409).
      operationId: createShowroom
      externalDocs:
        description: Showrooms Flutter guide (UA)
        url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/SHOWROOMS_FLUTTER_UA.md
      security:
        - bearerAuth: []
      x-roles: [owner, manager]
      parameters:
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [draft]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShowroomInput'
            examples:
              draft_create:
                summary: Minimal create payload
                value:
                  name: "Atelier Nova"
                  country: "Ukraine"
                  city: "Kyiv"
                  category: "womenswear"
                  type: "multibrand"
                  contacts:
                    instagram: "https://instagram.com/ateliernova"
      responses:
        "200":
          description: Showroom created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          showroom:
                            $ref: '#/components/schemas/ShowroomPrivileged'
              examples:
                created:
                  value:
                    success: true
                    data:
                      showroom:
                        id: "sr_123"
                        name: "Atelier Nova"
                        type: "multibrand"
                        country: "Ukraine"
                        ownerUid: "owner_123"
                        city: "Kyiv"
                        status: "draft"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "409":
          description: Recreation cooldown or other conflict states (`SHOWROOM_RECREATE_COOLDOWN` may include `error.meta.nextAvailableAt`)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
              examples:
                recreate_cooldown:
                  summary: Same owner recreates same showroom too early after soft delete
                  value:
                    error:
                      code: SHOWROOM_RECREATE_COOLDOWN
                      message: Showroom can be recreated after cooldown period
                      meta:
                        nextAvailableAt: "2026-05-26T13:00:00.000Z"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "403":
          description: Forbidden or country blocked
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /showrooms/draft:
    post:
      tags: [Showrooms]
      summary: Create or reuse draft showroom
      description: Creates or reuses a draft shell. This endpoint has no country payload; later create/update/submit requests must keep showroom.country aligned with `users.me.country` by normalized country identity.
      operationId: createDraftShowroom
      externalDocs:
        description: Showrooms Flutter guide (UA)
        url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/SHOWROOMS_FLUTTER_UA.md
      security:
        - bearerAuth: []
      x-roles: [owner]
      responses:
        "200":
          description: Draft showroom
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          showroom:
                            $ref: '#/components/schemas/ShowroomPrivileged'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /showrooms/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Showroom ID
    get:
      tags: [Showrooms]
      summary: Get showroom by ID
      description: |
        Public for approved showrooms. For non-approved, owner/admin only.
        Authorization header is optional.
        Public viewers receive a public detail DTO with `geo.coords`.
        Owner/admin viewers receive a privileged DTO with moderation/audit fields and exact coordinates.
        Soft-deleted showrooms are hidden from public and owner detail fetches.
        Admin can still access deleted showrooms for moderation/support workflows.
        Showrooms from blocked countries are hidden from public and owner contexts.
        Admin can still access blocked-country showrooms for moderation/support workflows.
      operationId: getShowroomById
      security: []
      responses:
        "200":
          description: Showroom
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          showroom:
                            oneOf:
                              - $ref: '#/components/schemas/ShowroomDetailPublic'
                              - $ref: '#/components/schemas/ShowroomPrivileged'
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
    patch:
      tags: [Showrooms]
      summary: Update showroom
      description: |
        Only owner can edit, only for draft/rejected/approved. Pending is locked.
        Showroom country must match `users.me.country` by normalized country identity. Backend accepts ISO2 and full country names.
        Backend validates `type` (`multibrand|unique`) and `availability` (`open|appointment`) against the documented contract.
        When `geo` is patched, backend recomputes search fields and updates legacy compatibility mirrors (`city`, `location`) from canonical `geo`.
        Error codes: SHOWROOM_LOCKED_PENDING (409), SHOWROOM_NOT_EDITABLE (400), NO_FIELDS_TO_UPDATE (400).
      operationId: updateShowroom
      externalDocs:
        description: Showrooms Flutter guide (UA)
        url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/SHOWROOMS_FLUTTER_UA.md
      security:
        - bearerAuth: []
      x-roles: [owner]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShowroomInput'
            examples:
              update_contacts:
                value:
                  address: "Khreshchatyk 1"
                  contacts:
                    phone: "+380501112233"
                    instagram: "https://instagram.com/ateliernova"
      responses:
        "200":
          description: Showroom updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          showroom:
                            $ref: '#/components/schemas/ShowroomPrivileged'
        "400":
          description: Validation error or not editable
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "403":
          description: Forbidden or country blocked (includes country mismatch)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "409":
          description: Locked (pending)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
              examples:
                locked_pending:
                  value:
                    success: false
                    error:
                      code: SHOWROOM_LOCKED_PENDING
                      message: Showroom is locked while pending moderation

    delete:
      tags: [Showrooms]
      summary: Soft delete showroom (owner)
      description: |
        Only owner can delete, only for draft/rejected/approved. Pending is locked.
        Error codes: SHOWROOM_LOCKED_PENDING (409), SHOWROOM_NOT_EDITABLE (400).
        Soft delete keeps the document (`status=deleted`) and stores `deletedAt`/`deletedBy`.
        Recreating the same showroom name for the same owner is backend-blocked for 3 calendar months after delete (`SHOWROOM_RECREATE_COOLDOWN`, 409).
      operationId: deleteShowroom
      security:
        - bearerAuth: []
      x-roles: [owner]
      responses:
        "200":
          description: Showroom deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          showroom:
                            $ref: '#/components/schemas/ShowroomPrivileged'
        "400":
          description: Not editable
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "409":
          description: Locked (pending)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /showrooms/{id}/share:
