components:
  schemas:
    OAuthLoginInput:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Firebase ID Token (Google/Apple/any provider)

paths:
  /auth/oauth:
    post:
      tags: [Auth]
      summary: Login via Firebase ID token (Google/Apple/any)
      description: |
        Bootstrap auth endpoint using Firebase ID token.
        Route is public, but body is validated before controller execution.
        Controller verifies the provided token in service layer after schema validation.
        Backend emits auth analytics (`auth_completed` / `auth_failed`) and auth domain logs.
      operationId: oauthLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthLoginInput'
            examples:
              firebase_id_token:
                summary: Valid Firebase token login
                value:
                  idToken: "eyJhbGciOiJSUzI1NiIsImtpZCI6Ii4uLiJ9.eyJ1aWQiOiJ1c2VyXzEyMyJ9.signature"
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: './users.yaml#/components/schemas/User'
              examples:
                ok:
                  value:
                    success: true
                    data:
                      user:
                        uid: "user_123"
                        role: "user"
                        roles: ["user"]
                        status: "active"
                        onboardingState: "completed"
                        country: "Ukraine"
        "400":
          description: Missing/empty `idToken` (`ID_TOKEN_REQUIRED`) or malformed body (`VALIDATION_ERROR`)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
              examples:
                id_token_required:
                  value:
                    success: false
                    error:
                      code: ID_TOKEN_REQUIRED
                      message: idToken is required
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
              examples:
                auth_invalid:
                  value:
                    success: false
                    error:
                      code: AUTH_INVALID
                      message: Invalid or expired token
        "500":
          description: Auth error
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
