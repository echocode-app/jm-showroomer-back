components:
  schemas:
    LookbookImage:
      type: object
      properties:
        storagePath:
          type: string
          description: Canonical Storage path.
        order:
          type: integer
        url:
          type: string
          nullable: true
          description: Signed read URL (detail endpoint only).

    LookbookAuthor:
      type: object
      properties:
        name:
          type: string
        position:
          type: string
          nullable: true
        instagram:
          type: string
          nullable: true
          format: uri
          description: Public author profile URL. Can point to Instagram or another external profile.

    LookbookItem:
      type: object
      properties:
        name:
          type: string
          description: Fallback display label for UI. Flutter may show it directly when no local translation exists.
        nameKey:
          type: string
          nullable: true
          description: Stable localization key for the clothing item label. Flutter should localize by `nameKey` and fallback to `name`.
        brand:
          type: string
          nullable: true
        link:
          type: string
          format: uri
          description: External URL for the tagged outfit item.

    Lookbook:
      type: object
      properties:
        id:
          type: string
        imageUrl:
          type: string
          nullable: true
        showroomId:
          type: string
          nullable: true
        authorId:
          type: string
          nullable: true
        likesCount:
          type: integer
          nullable: true
        likedByMe:
          type: boolean
          description: True when current auth/anonymous actor liked this lookbook.
        title:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
          description: Backward-compatible alias for title.
        description:
          type: string
          nullable: true
        author:
          type: object
          allOf:
            - $ref: '#/components/schemas/LookbookAuthor'
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/LookbookItem'
        country:
          type: string
          nullable: true
        countryNormalized:
          type: string
          nullable: true
          description: Lowercased canonical key for client-side country localization/filter state.
        city:
          type: string
          nullable: true
        cityNormalized:
          type: string
          nullable: true
        geo:
          type: object
          nullable: true
          properties:
            country:
              type: string
              nullable: true
            city:
              type: string
              nullable: true
            cityNormalized:
              type: string
              nullable: true
            coords:
              type: object
              nullable: true
              properties:
                lat:
                  type: number
                lng:
                  type: number
            geohash:
              type: string
              nullable: true
        seasonLabel:
          type: string
          nullable: true
        seasonKey:
          type: string
          nullable: true
        sortRank:
          type: integer
          nullable: true
        coverPath:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
          description: Signed read URL for cover image.
        images:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/LookbookImage'
        source:
          type: string
          enum: [seed, owner, admin]
          nullable: true
        published:
          type: boolean
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    LookbookShare:
      type: object
      required: [lookbookId, platform, shareUrl, deepLinkUrl, targets, recommendedText]
      properties:
        lookbookId:
          type: string
        lookbookTitle:
          type: string
          nullable: true
        platform:
          type: string
          enum: [ios, android]
          description: Final platform used by backend (query platform or auto-detected from User-Agent).
        shareUrl:
          type: string
          description: Stable URL for native share sheet. Points to backend redirect endpoint.
          example: https://jm-showroomer-back.onrender.com/api/v1/share/lookbooks/abc123
        deepLinkUrl:
          type: string
          description: App deep link route.
          example: jmshowroomer://lookbooks/abc123
        targets:
          type: object
          properties:
            ios:
              type: string
              nullable: true
              description: iOS fallback target (usually App Store URL).
            android:
              type: string
              nullable: true
              description: Android fallback target (usually Play Store URL).
        recommendedText:
          type: string
          description: Optional backend-generated share text template. Flutter may localize/override.

paths:
  /lookbooks:
    get:
      tags: [Lookbooks]
      summary: List lookbooks
      description: |
        Public list endpoint.
        Requires `country` query param. `seasonKey` is optional.
        Supports nearby mode via `nearLat/nearLng/nearRadiusKm` (same UX entrypoint as showrooms).
        Returns published lookbooks only.
        `items[].nameKey` is the preferred stable key for Flutter localization of clothing labels; fallback to `items[].name` when unknown.
        Blocked countries return an empty public catalog.
        Ordering is deterministic: ranked (`sortRank asc`) first, then unranked (`publishedAt desc`) with id tie-breaker.
        Signed URL is generated for coverPath only.
        Example query combinations are documented via parameter examples below.
      operationId: listLookbooks
      externalDocs:
        description: Flutter cursor pagination guide (all endpoints)
        url: https://github.com/echocode-app/jm-showroomer-back/blob/main/docs/readme/CURSOR_PAGINATION_FLUTTER.md
      security: []
      parameters:
        - name: country
          in: query
          required: true
          schema:
            type: string
            example: Ukraine
        - name: seasonKey
          in: query
          required: false
          schema:
            type: string
            example: summer
          description: "Optional season filter. Recommended values for MVP mock catalog: spring, summer, autumn, winter."
        - name: nearLat
          in: query
          required: false
          schema:
            type: number
            minimum: -90
            maximum: 90
            example: 50
          description: Nearby search center latitude. Must be used with nearLng.
        - name: nearLng
          in: query
          required: false
          schema:
            type: number
            minimum: -180
            maximum: 180
            example: 30
          description: Nearby search center longitude. Must be used with nearLat.
        - name: nearRadiusKm
          in: query
          required: false
          schema:
            type: number
            minimum: 0.1
            maximum: 200
            default: 10
            example: 5
          description: Optional nearby radius in kilometers. Used only with nearLat/nearLng.
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
          description: |
            Opaque backend cursor from previous response (`meta.nextCursor`).
            Lookbooks use v1 cursor with two internal modes:
            ranked `{v:1,m:"rank",r:number,id:string}` or
            published `{v:1,m:"published",p:ISODate,id:string}`.
            Do not construct or edit client-side.
      responses:
        "200":
          description: Lookbooks list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          lookbooks:
                            type: array
                            items:
                              $ref: '#/components/schemas/Lookbook'
                      meta:
                        type: object
                        properties:
                          hasMore:
                            type: boolean
                          nextCursor:
                            type: string
                            nullable: true
                          paging:
                            type: string
                            enum: [enabled, end]
              examples:
                country_only:
                  summary: Country feed without season filter
                  value:
                    success: true
                    data:
                      lookbooks: []
                    meta:
                      hasMore: false
                      nextCursor: null
                      paging: end
                nearby_feed:
                  summary: Nearby feed
                  value:
                    success: true
                    data:
                      lookbooks: []
                    meta:
                      hasMore: false
                      nextCursor: null
                      paging: end
        "400":
          description: Invalid query or cursor
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "503":
          description: Missing required Firestore index (INDEX_NOT_READY)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
    post:
      tags: [Lookbooks]
      summary: Create lookbook
      description: |
        Public-compatible create.
        Auth users are stored as owner (`authorId=uid`); guests use `x-anonymous-id`.
        If guest id header is missing, backend generates and returns it in `x-anonymous-id` response header.
      operationId: createLookbook
      security: []
      parameters:
        - name: x-anonymous-id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageUrl, showroomId]
              properties:
                imageUrl:
                  type: string
                  format: uri
                showroomId:
                  type: string
                description:
                  type: string
                  maxLength: 1000
                author:
                  $ref: '#/components/schemas/LookbookAuthor'
                items:
                  type: array
                  maxItems: 30
                  items:
                    $ref: '#/components/schemas/LookbookItem'
      responses:
        "201":
          description: Lookbook created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          lookbook:
                            $ref: '#/components/schemas/Lookbook'
        "400":
          description: Validation error (`VALIDATION_ERROR`) or invalid anonymous id (`ANON_ID_INVALID`)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /lookbooks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Lookbooks]
      summary: Get lookbook by id
      description: Returns published lookbook for public callers. Blocked-country lookbooks are hidden from public detail.
      operationId: getLookbookById
      security: []
      responses:
        "200":
          description: Lookbook details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          lookbook:
                            $ref: '#/components/schemas/Lookbook'
        "404":
          description: Not found, unpublished, or blocked by country policy
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
  /lookbooks/{id}/share:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Lookbook ID
      - name: platform
        in: query
        required: false
        schema:
          type: string
          enum: [auto, ios, android]
          default: auto
        description: |
          Platform override for link packaging.
          `auto` detects platform from User-Agent.
    get:
      tags: [Lookbooks]
      summary: Get share payload for lookbook
      description: |
        Returns share metadata for native share sheet integration.
        Only published lookbooks are shareable via public links.
        Lookbooks from blocked countries are not shareable.
      operationId: getLookbookSharePayload
      security: []
      responses:
        "200":
          description: Share payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          share:
                            $ref: '#/components/schemas/LookbookShare'
        "400":
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "404":
          description: Lookbook not found, blocked by country policy, or not shareable
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
    patch:
      tags: [Lookbooks]
      summary: Update lookbook
      description: |
        Public-compatible update with ownership validation.
        Allowed when current actor matches `authorId` (auth) or `x-anonymous-id` (guest).
      operationId: updateLookbook
      security: []
      parameters:
        - name: x-anonymous-id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imageUrl:
                  type: string
                  format: uri
                showroomId:
                  type: string
                description:
                  type: string
                  nullable: true
                  maxLength: 1000
                author:
                  type: object
                  allOf:
                    - $ref: '#/components/schemas/LookbookAuthor'
                  nullable: true
                items:
                  type: array
                  nullable: true
                  maxItems: 30
                  items:
                    $ref: '#/components/schemas/LookbookItem'
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiSuccess'
        "403":
          description: Not owner
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "400":
          description: Validation error (`VALIDATION_ERROR`) or invalid anonymous id (`ANON_ID_INVALID`)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
    delete:
      tags: [Lookbooks]
      summary: Delete lookbook
      description: Public-compatible delete with ownership validation.
      operationId: deleteLookbook
      security: []
      parameters:
        - name: x-anonymous-id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiSuccess'
        "403":
          description: Not owner
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "400":
          description: Invalid anonymous id (`ANON_ID_INVALID`)
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /lookbooks/{id}/favorite:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Lookbooks]
      summary: Add lookbook to favorites
      description: |
        Auth-only favorite action (idempotent).
        Guest flow must use local state and `POST /collections/favorites/lookbooks/sync` after login.
      operationId: favoriteLookbook
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Favorited
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          lookbookId:
                            type: string
                          status:
                            type: string
                            example: favorited
        "404":
          description: Lookbook not found
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
    delete:
      tags: [Lookbooks]
      summary: Remove lookbook from favorites
      description: |
        Auth-only favorite removal (idempotent).
        Guest flow must use local state and `POST /collections/favorites/lookbooks/sync` after login.
      operationId: unfavoriteLookbook
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          lookbookId:
                            type: string
                          status:
                            type: string
                            example: removed
        "404":
          description: Lookbook not found
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /share/lookbooks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Lookbook ID
      - name: platform
        in: query
        required: false
        schema:
          type: string
          enum: [auto, ios, android]
          default: auto
        description: Optional platform override. `auto` uses User-Agent detection.
    get:
      tags: [Lookbooks]
      summary: Redirect lookbook share link to mobile store target
      description: |
        Public redirect endpoint used as final shared URL.
        Expected behavior:
        - Opening the app directly from the shared HTTPS link requires configured universal links / app links on the final share domain.
        - Without OS-level link association, this endpoint can only redirect to App Store / Play Store fallback.
      operationId: redirectLookbookShare
      security: []
      responses:
        "302":
          description: Redirect to platform-specific mobile store target
        "400":
          description: Invalid query params
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "404":
          description: Lookbook not found, blocked by country policy, or not shareable
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /lookbooks/create:
    post:
      tags: [Lookbooks]
      summary: Create lookbook (legacy alias)
      description: |
        Backward-compatible alias for `POST /lookbooks`.
        Migration target: use `POST /lookbooks` for all new clients.
      operationId: createLookbookLegacyAlias
      deprecated: true
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageUrl, showroomId]
              properties:
                imageUrl:
                  type: string
                  format: uri
                showroomId:
                  type: string
                description:
                  type: string
                  maxLength: 1000
                author:
                  $ref: '#/components/schemas/LookbookAuthor'
                items:
                  type: array
                  maxItems: 30
                  items:
                    $ref: '#/components/schemas/LookbookItem'
      responses:
        "201":
          description: Lookbook created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          lookbook:
                            type: object
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'

  /lookbooks/{id}/rsvp:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Lookbooks]
      summary: RSVP to lookbook (stub)
      description: MVP2. Stub in MVP1.
      operationId: rsvpLookbook
      security:
        - bearerAuth: []
      responses:
        "200":
          description: RSVP response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: './common.yaml#/components/schemas/ApiSuccess'
                  - properties:
                      data:
                        type: object
                        properties:
                          lookbookId:
                            type: string
                          user:
                            type: string
                          status:
                            type: string
                            example: RSVPed
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
