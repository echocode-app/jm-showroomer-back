components:
  schemas:
    ApiSuccess:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        meta:
          type: object
    ApiError:
      type: object
      description: |
        Error envelope returned by backend endpoints.
        Some handlers return `{ success: false, error }`, while the global error middleware returns `{ error }`.
      required: [error]
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: '#/components/schemas/Error'
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Error code. See ErrorCode for common values.
        message:
          type: string
        meta:
          type: object
          additionalProperties: true
          description: |
            Optional safe machine-readable metadata for the error.
            Example: `SHOWROOM_RECREATE_COOLDOWN` may include `nextAvailableAt` (ISO timestamp).
    ErrorCode:
      type: string
      description: |
        Canonical backend error codes used by `error.code`.
        Flutter clients should branch on `error.code` first, then map UX locally.
      enum:
        - AUTH_MISSING
        - AUTH_INVALID
        - NO_AUTH
        - ID_TOKEN_REQUIRED
        - ACCESS_DENIED
        - FORBIDDEN
        - COUNTRY_BLOCKED
        - USER_NOT_FOUND
        - SHOWROOM_NOT_FOUND
        - LOOKBOOK_NOT_FOUND
        - EVENT_NOT_FOUND
        - NOT_FOUND
        - VALIDATION_ERROR
        - SHOWROOM_NAME_REQUIRED
        - SHOWROOM_TYPE_REQUIRED
        - COUNTRY_REQUIRED
        - SHOWROOM_NAME_INVALID
        - SHOWROOM_CATEGORY_GROUP_INVALID
        - SHOWROOM_SUBCATEGORY_INVALID
        - SHOWROOM_SUBCATEGORY_GROUP_MISMATCH
        - INSTAGRAM_INVALID
        - PHONE_INVALID
        - SHOWROOM_INCOMPLETE
        - SHOWROOM_NOT_EDITABLE
        - SHOWROOM_NAME_ALREADY_EXISTS
        - SHOWROOM_DUPLICATE
        - NO_FIELDS_TO_UPDATE
        - QUERY_INVALID
        - CURSOR_INVALID
        - EVENT_SYNC_LIMIT_EXCEEDED
        - LOOKBOOK_SYNC_LIMIT_EXCEEDED
        - SHOWROOM_SYNC_LIMIT_EXCEEDED
        - LOOKBOOK_FORBIDDEN
        - SHOWROOM_ID_INVALID
        - ANON_ID_INVALID
        - NOTIFICATION_NOT_FOUND
        - NOTIFICATION_TYPE_INVALID
        - INDEX_NOT_READY
        - SHOWROOM_LOCKED_PENDING
        - SHOWROOM_PENDING_SNAPSHOT_MISSING
        - SHOWROOM_RECREATE_COOLDOWN
        - USER_COUNTRY_CHANGE_BLOCKED
        - USER_DELETE_BLOCKED
        - RATE_LIMIT_EXCEEDED
        - EVENTS_WRITE_MVP2_ONLY
        - NOT_IMPLEMENTED
        - LOAD_USER_ERROR
        - AUTH_ERROR
        - INTERNAL_ERROR
    NotificationType:
      type: string
      description: |
        Supported notification types in storage/push infrastructure.
        Runtime delivery is additionally gated by backend policy.
        With `MVP_MODE=true`, only `SHOWROOM_APPROVED` and `SHOWROOM_REJECTED`
        are delivered to users.
      enum:
        - SHOWROOM_APPROVED
        - SHOWROOM_REJECTED
        - SHOWROOM_DELETED_BY_ADMIN
        - SHOWROOM_FAVORITED
        - LOOKBOOK_FAVORITED
        - EVENT_WANT_TO_VISIT
    Notification:
      type: object
      description: |
        Firestore notification document (MVP).
        Structure: `users/{uid}/notifications/{dedupeKey}`.
        Used by read endpoints for list, mark-as-read, and unread count.
      required:
        - type
        - actorUid
        - resource
        - payload
        - createdAt
        - readAt
        - isRead
        - dedupeKey
      properties:
        type:
          $ref: '#/components/schemas/NotificationType'
        actorUid:
          type: string
          nullable: true
          description: UID of actor that triggered the notification; null when not applicable.
        resource:
          type: object
          required: [type, id]
          properties:
            type:
              type: string
              enum: [showroom, lookbook, event]
            id:
              type: string
        payload:
          type: object
          additionalProperties: true
          description: |
            Compact metadata for UI rendering.
            Backend sanitizes payload per notification type:
            - SHOWROOM_APPROVED / SHOWROOM_REJECTED / SHOWROOM_DELETED_BY_ADMIN / SHOWROOM_FAVORITED:
              `showroomName`, optional `reason`, optional `deletedAt` (ISO)
            - LOOKBOOK_FAVORITED: `lookbookName`
            - EVENT_WANT_TO_VISIT: `eventName`
            When `MVP_MODE=true`, backend currently emits only
            `SHOWROOM_APPROVED` and `SHOWROOM_REJECTED`.
        createdAt:
          type: string
          format: date-time
          readOnly: true
          description: Set by backend using Firestore server timestamp.
        readAt:
          type: string
          format: date-time
          nullable: true
          description: Null by default in MVP storage.
        isRead:
          type: boolean
          description: False by default in MVP storage.
          example: false
        dedupeKey:
          type: string
          description: Deterministic idempotency key, also used as document id.
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok ✅"
        env:
          type: string
        timestamp:
          type: string
          format: date-time
    GeoCoords:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
    GeoLocation:
      type: object
      required: [city, coords]
      properties:
        city:
          type: string
        cityNormalized:
          type: string
          readOnly: true
        country:
          type: string
          nullable: true
        coords:
          $ref: '#/components/schemas/GeoCoords'
        geohash:
          type: string
          readOnly: true
        placeId:
          type: string
          nullable: true

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      security: []
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ApiError'
